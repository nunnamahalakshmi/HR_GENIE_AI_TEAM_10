<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRMS — Self Details</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #ffffff;
      --ink-mid: #a3b8cc;
      --ink-light: #7a8fa3;
      --accent: #0a6b6e;
      --accent-bright: #0d9298;
      --accent-glow: rgba(13, 146, 152, 0.18);
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --bg-base: #0f1923;
    }

    html,
    body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--bg-base);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(13, 146, 152, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(13, 146, 152, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(-45deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 28px);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Navbar ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      padding: 0 4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 25, 35, 0.7);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #0d9298, #0a6b6e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo-mark i {
      font-size: 14px;
      color: #fff;
    }

    .nav-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #fff;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .nav-logo-text span {
      color: var(--accent-bright);
    }

    .nav-user {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-mid);
      cursor: pointer;
      transition: 0.3s ease;
    }

    .nav-user:hover {
      color: #fff;
      border-color: var(--accent-bright);
      background: var(--accent-glow);
      transform: translateY(-2px);
    }

    /* Dropdown CSS - Styled for Glassmorphism */
    .nav-user-dropdown-container {
      position: relative;
      display: inline-block;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 55px;
      background: rgba(15, 25, 35, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      min-width: 180px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      border-radius: 12px;
      overflow: hidden;
      animation: fadeIn 0.2s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dropdown-menu a {
      color: var(--ink-mid);
      padding: 14px 20px;
      text-decoration: none;
      display: flex;
      align-items: center;
      font-size: 14px;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .dropdown-menu a:hover {
      background-color: var(--surface-hover);
      color: #fff;
      padding-left: 24px;
    }

    .dropdown-menu a i {
      margin-right: 12px;
      width: 16px;
      text-align: center;
      color: var(--accent-bright);
      transition: transform 0.2s ease;
    }

    .dropdown-menu a:hover i {
      transform: scale(1.1);
    }

    .show {
      display: block;
    }

    /* ── Main Container ── */
    .container {
      padding: 110px 5% 60px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Profile Section */
    .profile-section {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.6s ease forwards;
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .avatar i {
      font-size: 50px;
      color: #94a3b8;
    }

    /* Glow removed behind avatar */

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pd-row {
      font-size: 14px;
      color: var(--ink-mid);
      letter-spacing: 0.03em;
    }

    .pd-label {
      font-weight: 500;
      color: var(--ink-light);
      margin-right: 4px;
    }

    .pd-val {
      color: #fff;
      font-weight: 600;
    }

    .pd-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--accent-bright);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      width: 100%;
      animation: fadeInUp 0.6s 0.2s ease forwards;
      opacity: 0;
    }

    /* Refined Card Design */
    .dash-card {
      display: flex;
      height: 90px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .dash-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .dash-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .dash-card:hover::before {
      opacity: 1;
    }

    /* Left Color Block */
    .dc-icon-box {
      width: 40%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
      position: relative;
      z-index: 2;
    }

    .dc-icon-box i {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.9);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .dash-card:hover .dc-icon-box {
      width: 45%;
    }

    .dash-card:hover .dc-icon-box i {
      transform: scale(1.15);
    }

    /* Right Text Area */
    .dc-text-box {
      width: 60%;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.02);
    }

    .dc-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
      transition: color 0.3s;
    }

    .dc-sub {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .c-data .dc-icon-box {
      background: linear-gradient(135deg, #84cc16, #65a30d);
    }

    .c-profile .dc-icon-box {
      background: linear-gradient(135deg, #f97316, #ea580c);
    }

    .c-policy .dc-icon-box {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .c-campus .dc-icon-box {
      background: linear-gradient(135deg, #a855f7, #9333ea);
    }

    .c-career .dc-icon-box {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .c-finder .dc-icon-box {
      background: linear-gradient(135deg, #8c73b0, #735996);
    }

    .c-finance .dc-icon-box {
      background: linear-gradient(135deg, #14b8a6, #0d9488);
    }

    .c-track .dc-icon-box {
      background: linear-gradient(135deg, #84cc16, #65a30d);
    }

    .c-works .dc-icon-box {
      background: linear-gradient(135deg, #f97316, #ea580c);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .dash-card {
        height: 80px;
      }

      .dc-title {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <a href="hrms_landing_page.html" class="nav-logo">
      <div class="nav-logo-mark"><i class="fas fa-layer-group"></i></div>
      <span class="nav-logo-text">HRMS <span>Portal</span></span>
    </a>
    <div class="nav-user-dropdown-container">
      <div class="nav-user" onclick="toggleDropdown()">
        <i class="fas fa-user"></i>
      </div>
      <div class="dropdown-menu" id="userDropdown">
        <a href="#"><i class="fas fa-info-circle"></i> About</a>
        <a href="#"><i class="fas fa-cog"></i> Settings</a>
        <a href="hrms_employee_login_page.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">

    <!-- Profile Area -->
    <div class="profile-section">
      <div class="avatar-wrap">
        <div class="avatar">
          <i class="fas fa-user"></i>
        </div>
      </div>
      <div class="profile-details">
        <div class="pd-row"><span class="pd-label">StaffCode :</span> <span class="pd-val" id="profile-code">...</span>
        </div>
        <div class="pd-name" id="profile-name">...</div>
        <div class="pd-row"><span class="pd-label">DepartmentName :</span> <span class="pd-val"
            id="profile-dept">...</span></div>
        <div class="pd-row"><span class="pd-label">Asset ID :</span> <span class="pd-val" id="profile-asset">...</span>
        </div>
      </div>
    </div>

    <!-- Dashboard Grid -->
    <div class="dashboard-grid">

      <!-- Card 1 -->
      <a href="hrms_my_data_page.html" class="dash-card c-data">
        <div class="dc-icon-box"><i class="fas fa-table"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">View</div>
          <div class="dc-title">My Data</div>
        </div>
      </a>

      <!-- Card 2 -->
      <a href="hrms_my_profile.html" class="dash-card c-profile">
        <div class="dc-icon-box"><i class="fas fa-user-alt"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">Manage</div>
          <div class="dc-title">My Profile</div>
        </div>
      </a>

      <!-- Card 3 -->
      <a href="hrms_my_policy.html" class="dash-card c-policy">
        <div class="dc-icon-box"><i class="fas fa-file-alt"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">Guidelines</div>
          <div class="dc-title">My Policy</div>
        </div>
      </a>

      <!-- Card 5 -->
      <a href="hrms_my_campus.html" class="dash-card c-campus">
        <div class="dc-icon-box"><i class="fas fa-building"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">Facilities</div>
          <div class="dc-title">My Campus</div>
        </div>
      </a>


      <!-- Card 6 -->
      <a href="hrms_my_finance.html" class="dash-card c-finance">
        <div class="dc-icon-box"><i class="fas fa-rupee-sign"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">Payroll</div>
          <div class="dc-title">My Finance</div>
        </div>
      </a>

      <!-- Card 7 -->
      <a href="hrms_my_track.html" class="dash-card c-track">
        <div class="dc-icon-box"><i class="fas fa-road"></i></div>
        <div class="dc-text-box">
          <div class="dc-sub">Leaves</div>
          <div class="dc-title">My Track</div>
        </div>
      </a>


    </div>
  </div>

  <script>
    function toggleDropdown() {
      document.getElementById("userDropdown").classList.toggle("show");
    }

    // Close the dropdown if the user clicks outside of it
    window.onclick = function (event) {
      if (!event.target.matches('.nav-user') && !event.target.matches('.nav-user i')) {
        var dropdowns = document.getElementsByClassName("dropdown-menu");
        for (var i = 0; i < dropdowns.length; i++) {
          var openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('show')) {
            openDropdown.classList.remove('show');
          }
        }
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const userEmail = localStorage.getItem("userEmail");

      // If we have an email stored from the login page, we fetch the details.
      if (userEmail) {

        const powerAutomateUrl = "https://default7359f89671e24daeb8a315cdf97f2f.10.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2cb34a7d76d943b0bf9604e7283d3c23/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=cXVoaib8Ce__kB8XkXZ_4deGeifbq9m302dSoa1axxA";

        fetch(powerAutomateUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail })
        })
          .then(res => res.json())
          .then(data => {
            // We assume your Power Automate returns JSON like:
            // { "status": "success", "staffCode": "5517", "name": "Y.Veera Vasantharao", "department": "T-HUB", "assetId": "3" }

            if (data.status === "success") {
              document.getElementById("profile-code").textContent = data.staffCode || "N/A";
              document.getElementById("profile-name").textContent = data.name || "N/A";
              document.getElementById("profile-dept").textContent = data.department || "N/A";
              document.getElementById("profile-asset").textContent = data.assetId || "N/A";
            } else {
              console.error("Could not fetch profile from SharePoint.");
            }
          })
          .catch(err => {
            console.error("Error connecting to Power Automate:", err);
          });
      }
    });
  </script>
</body>

</html>
