<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRMS — HR Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #ffffff;
      --ink-mid: #a3b8cc;
      --ink-light: #7a8fa3;
      --gold: #b8832a;
      --gold-bright: #d4a043;
      --gold-glow: rgba(212, 160, 67, 0.18);
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --bg-base: #08111e;
    }

    html,
    body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--bg-base);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 28%, rgba(212, 160, 67, 0.06) 0%, transparent 48%),
        radial-gradient(circle at 82% 72%, rgba(184, 131, 42, 0.04) 0%, transparent 46%);
      pointer-events: none;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(-45deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 28px);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Navbar ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      padding: 0 4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8, 17, 30, 0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--gold-glow);
    }

    .nav-logo-mark i {
      font-size: 14px;
      color: #fff;
    }

    .nav-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #fff;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .nav-logo-text span {
      color: var(--gold-bright);
      font-style: italic;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink-mid);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
    }

    .logout-btn:hover {
      color: #fff;
      border-color: var(--gold-bright);
      background: var(--gold-glow);
    }

    /* ── Main Container ── */
    .container {
      padding: 100px 5% 60px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header Section */
    .header-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease forwards;
    }

    .header-titles h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .header-titles p {
      color: var(--ink-light);
      font-size: 14px;
    }

    .add-btn {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(212, 160, 67, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }

    .add-btn:hover {
      transform: translateY(-2px);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      animation: fadeInUp 0.6s 0.1s ease forwards;
      opacity: 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--gold-bright);
      border-radius: 3px 0 0 3px;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gold-glow);
      color: var(--gold-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    /* Table Section */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      animation: fadeInUp 0.6s 0.2s ease forwards;
      opacity: 0;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .table-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-light);
      font-size: 13px;
    }

    .search-box input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 14px 10px 36px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 260px;
      outline: none;
      transition: 0.2s;
    }

    .search-box input:focus {
      border-color: var(--gold);
    }

    /* Data Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th {
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      font-size: 14px;
      color: var(--ink-mid);
      vertical-align: middle;
    }

    .data-table tr {
      transition: background 0.2s;
    }

    .data-table tr:hover {
      background: var(--surface-hover);
    }

    /* Table specific elements */
    .emp-name-col {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emp-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .emp-name {
      color: #fff;
      font-weight: 500;
    }

    .emp-email {
      font-size: 12px;
      color: var(--ink-light);
      margin-top: 2px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .status-leave {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .action-btn {
      background: transparent;
      border: none;
      color: var(--ink-light);
      cursor: pointer;
      font-size: 14px;
      padding: 6px;
      transition: 0.2s;
    }

    .action-btn:hover {
      color: var(--gold-bright);
    }

    /* Loading State */
    .loading-overlay {

      text-align: center;
      padding: 40px 0;
      color: var(--gold-bright);
      font-size: 24px;
      display: none;
      /* Shown via JS */
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .header-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .data-table th:nth-child(4),
      .data-table td:nth-child(4),
      .data-table th:nth-child(5),
      .data-table td:nth-child(5) {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <a href="#" class="nav-logo">
      <div class="nav-logo-mark"><i class="fas fa-user-shield"></i></div>
      <span class="nav-logo-text">HR Admin <span>Portal</span></span>
    </a>
    <div class="nav-user">
      <a href="hrms_HR_login_page.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">

    <div class="header-section">
      <div class="header-titles">
        <h1 id="welcome-text">Welcome back, Admin</h1>
        <p>Manage your workforce, monitor statuses, and update records.</p>
      </div>
      <button class="add-btn"><i class="fas fa-plus"></i> Add New Employee</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value" id="stat-total">-</div>
        <div class="stat-label">Total Employees</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.15); color: #34d399;"><i
            class="fas fa-user-check"></i></div>
        <div class="stat-value" id="stat-active">-</div>
        <div class="stat-label">Active Staff</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.15); color: #fbbf24;"><i
            class="fas fa-plane-departure"></i></div>
        <div class="stat-value" id="stat-leave">-</div>
        <div class="stat-label">On Leave</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(239, 68, 68, 0.15); color: #f87171;"><i
            class="fas fa-user-times"></i></div>
        <div class="stat-value" id="stat-inactive">0</div>
        <div class="stat-label">Inactive</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">Employee Directory</div>
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search by name, ID, or email..." onkeyup="filterTable()">
        </div>
      </div>

      <div id="loading" class="loading-overlay"><i class="fas fa-circle-notch fa-spin"></i></div>

      <div style="overflow-x: auto;">
        <table class="data-table" id="empTable">
          <thead>
            <tr>
              <th>Staff Code</th>
              <th>Employee Info</th>
              <th>Department</th>
              <th>Designation</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data will be injected here via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Utility: Generate initials from name
    function getInitials(name) {
      if (!name) return "U";
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    document.addEventListener("DOMContentLoaded", function () {

      // 1. Get logged in HR email to show a personalized welcome
      const hrEmail = localStorage.getItem("userEmail");
      if (hrEmail) {
        document.getElementById("welcome-text").textContent = "Welcome back, " + hrEmail.split('@')[0];
      }

      // 2. Fetch all employees to display in the table
      // 🔴 LATER: Replace this with your new "Get All Employees" Power Automate Webhook URL 🔴
      const flowUrl = ""; // Leave blank for now, we will use Dummy Data

      if (flowUrl) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('empTable').style.display = 'none';

        // Fetch from flow
        fetch(flowUrl, { method: "POST" })
          .then(res => res.json())
          .then(data => renderTable(data.employees))
          .catch(err => console.error("Error fetching employees:", err));
      } else {
        // 🔴 TEMPORARY DUMMY DATA FOR DEMO PURPOSES 🔴
        const dummyData = [
          { code: "EMP001", name: "Nikesh Kumar", email: "nikeshkumar@gmail.com", dept: "IT", role: "Software Engineer", status: "Active" },
          { code: "EMP002", name: "Nikesh HR", email: "nikesh@gmail.com", dept: "Human Resources", role: "HR Manager", status: "Active" },
          { code: "EMP003", name: "Manga", email: "manga@gmail.com", dept: "IT", role: "Frontend Developer", status: "Active" },
          { code: "EMP004", name: "Tarun", email: "tarun123@gmail.com", dept: "Finance", role: "Accountant", status: "On Leave" },
          { code: "EMP005", name: "Dinesh", email: "dinesh2821@gmail.com", dept: "IT", role: "Backend Developer", status: "Active" },
          { code: "EMP006", name: "Ramesh", email: "ramesh@gmail.com", dept: "Sales", role: "Sales Executive", status: "Inactive" },
          { code: "EMP007", name: "Priya", email: "priya.hr@gmail.com", dept: "Human Resources", role: "HR Executive", status: "Active" }
        ];
        renderTable(dummyData);
      }

    });

    // Function to render table rows
    function renderTable(employees) {
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = "";

      // Update Stats
      document.getElementById("stat-total").textContent = employees.length;
      document.getElementById("stat-active").textContent = employees.filter(e => e.status === "Active").length;
      document.getElementById("stat-leave").textContent = employees.filter(e => e.status === "On Leave").length;
      document.getElementById("stat-inactive").textContent = employees.filter(e => e.status === "Inactive").length;

      // Render Rows
      employees.forEach(emp => {
        let statusClass = "status-inactive";
        if (emp.status === "Active") statusClass = "status-active";
        else if (emp.status === "On Leave") statusClass = "status-leave";

        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td style="font-weight: 600;">${emp.code}</td>
        <td>
          <div class="emp-name-col">
            <div class="emp-avatar">${getInitials(emp.name)}</div>
            <div>
              <div class="emp-name">${emp.name}</div>
              <div class="emp-email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${emp.dept}</td>
        <td>${emp.role}</td>
        <td><span class="status-badge ${statusClass}">${emp.status}</span></td>
        <td>
          <button class="action-btn" title="Edit Record"><i class="fas fa-pen"></i></button>
          <button class="action-btn" title="View Details"><i class="fas fa-chevron-right"></i></button>
        </td>
      `;
        tbody.appendChild(tr);
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('empTable').style.display = 'table';
    }

    // Simple search filter function
    function filterTable() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#table-body tr");

      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
      });
    }
  </script>
</body>

</html>
